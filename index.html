<!DOCTYPE html>
<html>
<head>
    <title>Phone Client Test</title>
</head>
<body>
    <h1>Internet Connection Test</h1>
    <button id="connectBtn">Connect to Home PC</button>
    <p id="status">Status: Disconnected</p>

    <script>
        const connectBtn = document.getElementById('connectBtn');
        const statusText = document.getElementById('status');

        connectBtn.onclick = function() {
            statusText.innerText = "Status: Connecting...";
            
            // Connect to the localtunnel secure web socket address (wss://)
            // Notice we DO NOT type a port number here, localtunnel handles it on Port 443
            const socket = new WebSocket('wss://lucky-cats-hide.loca.lt');

            socket.onopen = function() {
                statusText.innerText = "Status: Connected Perfectly!";
                // Send a message the instant the pipe opens
                socket.send("Middle finger to TeamViewer! It works!");
            };

            socket.onmessage = function(event) {
                alert("PC Replied: " + event.data);
            };

            socket.onerror = function(error) {
                statusText.innerText = "Status: Connection Failed.";
            };
        };
    </script>
</body>
</html>
